    name: AWS Trusted Advisor API
    description: >-
      The AWS Support API provides programmatic access to AWS Trusted Advisor
      checks, results, and recommendations. It enables retrieving check summaries,
      refreshing checks, and accessing detailed results for cost optimization,
      performance, security, fault tolerance, and service limits.

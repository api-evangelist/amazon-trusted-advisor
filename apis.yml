aid: amazon-trusted-advisor
name: Amazon Trusted Advisor
description: >-
  AWS Trusted Advisor provides real-time guidance to help you provision your
  resources following AWS best practices. It inspects your AWS environment and
  makes recommendations for saving money, improving system performance and
  reliability, and closing security gaps across cost optimization, performance,
  security, fault tolerance, and service limits.
